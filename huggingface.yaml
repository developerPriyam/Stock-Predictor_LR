# StockVision AI

Premium dark-theme fintech dashboard with AI-powered stock predictions, technical indicators, company research, news intelligence (Claude-powered AI summaries), multi-stock comparison, and portfolio tracking.

See `DEPLOYMENT.md` for full instructions.

Set the **Space Secret** `EMERGENT_LLM_KEY` (or your own Anthropic/OpenAI key) to enable the AI news summaries.
